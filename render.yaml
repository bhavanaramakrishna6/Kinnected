# Render.com Deployment Configuration
# This file configures automatic deployment for both frontend and backend

services:
  # Backend Service
  - type: web
    name: kinnected-backend
    runtime: node
    plan: free
    region: oregon
  buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: FRONTEND_URL
        fromService:
          type: web
          name: kinnected-frontend
          property: url

  # Frontend Service (Static Site)
  - type: web
    name: kinnected-frontend
    runtime: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kinnected-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
